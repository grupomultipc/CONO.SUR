<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Río de Janeiro 2026 - Guía Visual</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green:  #009c3b;
      --yellow: #FFDF00;
      --navy:   #002776;
      --cream:  #FDF8F0;
      --text:   #2d2d2d;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text);
      margin: 0;
      line-height: 1.6;
    }

    .hero {
      background: linear-gradient(rgba(0,39,118,0.7), rgba(0,39,118,0.7)), 
                  url('fotos/vista espectacular durante trayecto.jpg');
      background-size: cover;
      background-position: center;
      height: 350px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
      border-bottom: 8px solid var(--yellow);
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      margin: 0;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .section-header {
      text-align: center;
      margin-bottom: 50px;
    }

    .section-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      color: var(--navy);
      margin-bottom: 10px;
    }

    .divider {
      width: 80px;
      height: 4px;
      background: var(--green);
      margin: 0 auto 20px;
    }

    /* Galería limpia sin textos ni enlaces */
    .galeria-fotos {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    .foto-item {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .foto-item img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }

    .foto-item img:hover {
      transform: scale(1.03);
    }

    footer {
      background: var(--navy);
      color: white;
      text-align: center;
      padding: 30px 0;
      margin-top: 60px;
    }
  </style>
</head>
<body>

  <header class="hero">
    <h1>Río de Janeiro</h1>
    <p>Crónica de viaje 2026</p>
  </header>

  <div class="container">
    
    <div class="section-header">
      <h2>Tren del Corcovado en la Selva</h2>
      <div class="divider"></div>
      <p>Un recorrido único a través de la Floresta de Tijuca.</p>
    </div>

    <div class="galeria-fotos">
      
      <div class="foto-item">
        <img src="fotos/vagones con sistema de cremallera.jpg" alt="Tren">
      </div>

      <div class="foto-item">
        <img src="fotos/ascenso entre floresta de tijuca.webp" alt="Selva">
      </div>

      <div class="foto-item">
        <img src="fotos/vista espectacular durante trayecto.jpg" alt="Vista">
      </div>

      <div class="foto-item">
        <img src="fotos/Copacabana.avif" alt="Copacabana">
      </div>

      <div class="foto-item">
        <img src="fotos/aeropuerto.jpg" alt="Aeropuerto">
      </div>

    </div>

  </div>

  <footer>
    <p>Tour Sudamérica 2026</p>
  </footer>

</body>
</html>
