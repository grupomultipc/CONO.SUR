<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería del Tour</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f5f7fa;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            padding: 40px 0;
        }
        .galeria-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }
        .foto-card {
            background: #fff;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            transition: transform 0.3s ease;
        }
        .foto-card:hover {
            transform: translateY(-8px);
        }
        .foto-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }
        .info {
            padding: 15px;
            text-align: center;
            background: #fff;
        }
        .info h3 {
            margin: 0;
            font-size: 1.1rem;
            color: #2c3e50;
            text-transform: capitalize;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Galería de Imágenes del Viaje</h1>
            <p>Explora los destinos destacados de nuestro próximo tour</p>
        </header>

        <div class="galeria-grid">
            
            <div class="foto-card">
                <img src="fotos/aeropuerto.jpg" alt="Aeropuerto">
                <div class="info"><h3>Traslado Aeropuerto</h3></div>
            </div>

            <div class="foto-card">
                <img src="fotos/ascenso entre floresta de tijuca.webp" alt="Floresta de Tijuca">
                <div class="info"><h3>Ascenso Floresta de Tijuca</h3></div>
            </div>

            <div class="foto-card">
                <img src="fotos/Copacabana.avif" alt="Copacabana">
                <div class="info"><h3>Playa de Copacabana</h3></div>
            </div>

            <div class="foto-card">
                <img src="fotos/vagones con sistema de cremallera.jpg" alt="Tren de cremallera">
                <div class="info"><h3>Sistema de Cremallera</h3></div>
            </div>

            <div class="foto-card">
                <img src="fotos/vista espectacular durante trayecto.jpg" alt="Vista trayecto">
                <div class="info"><h3>Vistas del Trayecto</h3></div>
            </div>

        </div>
    </div>

</body>
</html>
